<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitvaror Kampanjdashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --blue-dark:#003087;--blue-mid:#1a56db;--blue-light:#e8f0fe;
      --elgiganten:#003087;--power:#cc0000;--tretti:#007a3d;
      --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
      --orange:#ea580c;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
      --gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;
      --white:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.12);
      --shadow-md:0 4px 6px rgba(0,0,0,.1);--radius:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--gray-100);color:var(--gray-800);font-size:14px}

    /* ── LOGIN GATE ─────────────────────────────────────────── */
    #login-gate{
      position:fixed;inset:0;z-index:9999;
      background:linear-gradient(135deg,#001a4d 0%,#003087 60%,#005a9e 100%);
      display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:#fff;border-radius:16px;padding:40px 48px;
      box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;
      max-width:360px;width:90%;
    }
    .login-logo{font-size:40px;margin-bottom:8px}
    .login-title{font-size:22px;font-weight:800;color:var(--blue-dark);margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--gray-400);margin-bottom:28px}
    .login-input{
      width:100%;padding:12px 16px;font-size:15px;letter-spacing:2px;
      border:2px solid var(--gray-200);border-radius:8px;outline:none;
      text-align:center;margin-bottom:12px;transition:border-color .2s;
    }
    .login-input:focus{border-color:var(--blue-mid)}
    .login-btn{
      width:100%;padding:12px;background:var(--blue-dark);color:#fff;
      border:none;border-radius:8px;font-size:15px;font-weight:700;
      cursor:pointer;transition:background .2s;
    }
    .login-btn:hover{background:var(--blue-mid)}
    .login-error{
      color:var(--red);font-size:13px;margin-top:8px;
      height:18px;transition:opacity .2s;
    }
    #login-gate.fade-out{animation:fadeOut .4s forwards}
    @keyframes fadeOut{to{opacity:0;pointer-events:none}}

    /* ── HEADER ─────────────────────────────────────────────── */
    header{background:var(--blue-dark);color:#fff;padding:0 24px;
      display:flex;align-items:center;gap:16px;height:56px;
      position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
    header h1{font-size:18px;font-weight:700;flex:1}
    header h1 span{font-weight:400;opacity:.7;font-size:13px;margin-left:8px}
    #last-updated{font-size:12px;opacity:.7;white-space:nowrap}
    #btn-refresh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
      color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:background .2s}
    #btn-refresh:hover{background:rgba(255,255,255,.25)}

    /* ── LOADING ─────────────────────────────────────────────── */
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--gray-600)}
    .spinner{width:40px;height:40px;border:3px solid var(--gray-200);border-top-color:var(--blue-mid);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #error-msg{display:none;color:var(--red);padding:32px;text-align:center}

    /* ── MAIN ────────────────────────────────────────────────── */
    main{max-width:1400px;margin:0 auto;padding:20px 16px}

    /* ── KPI ─────────────────────────────────────────────────── */
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .kpi-card{background:#fff;border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border-left:4px solid var(--blue-mid)}
    .kpi-card.green{border-color:var(--green)}.kpi-card.red{border-color:var(--power)}.kpi-card.orange{border-color:var(--orange)}
    .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);margin-bottom:6px}
    .kpi-value{font-size:28px;font-weight:700;line-height:1}
    .kpi-sub{font-size:11px;color:var(--gray-400);margin-top:4px}

    /* ── TABS ────────────────────────────────────────────────── */
    .tab-bar{display:flex;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
    .tab-btn{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-600);border:none;background:transparent;border-bottom:3px solid transparent;transition:all .2s}
    .tab-btn:hover{background:var(--gray-100);color:var(--gray-800)}
    .tab-btn.active{color:var(--blue-mid);border-bottom-color:var(--blue-mid);background:var(--blue-light)}
    .tab-count{display:inline-block;background:var(--gray-200);color:var(--gray-600);font-size:11px;padding:1px 6px;border-radius:10px;margin-left:4px}
    .tab-btn.active .tab-count{background:var(--blue-mid);color:#fff}

    /* ── FILTERS ─────────────────────────────────────────────── */
    .filter-bar{background:#fff;border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
    .filter-bar input,.filter-bar select{padding:7px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;color:var(--gray-800);background:#fff;outline:none;transition:border-color .2s}
    .filter-bar input:focus,.filter-bar select:focus{border-color:var(--blue-mid)}
    #search-input{flex:1;min-width:180px}
    .filter-bar select{min-width:130px}
    #filter-rabatt{width:90px}
    #btn-clear{padding:7px 14px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:6px;cursor:pointer;font-size:13px;color:var(--gray-600)}
    #btn-clear:hover{background:var(--gray-200)}
    #result-info{font-size:12px;color:var(--gray-400);margin-left:auto;white-space:nowrap}

    /* ── TABLE ───────────────────────────────────────────────── */
    .table-wrapper{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .table-scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:var(--blue-dark);color:#fff}
    thead th{padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{background:#0040a8}
    thead th.sort-asc::after{content:" ▲";font-size:10px;opacity:.8}
    thead th.sort-desc::after{content:" ▼";font-size:10px;opacity:.8}
    tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
    tbody tr:hover{background:var(--blue-light)}
    tbody td{padding:9px 12px;vertical-align:middle}
    tbody td.num{text-align:right;font-variant-numeric:tabular-nums}

    /* ── FEATURED ROW ────────────────────────────────────────── */
    tbody tr.featured{background:#fffbeb}
    tbody tr.featured:hover{background:#fef3c7}
    tbody tr.featured td:first-child::before{content:"★ ";color:#f59e0b;font-size:12px}

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:capitalize}
    .badge-elgiganten{background:#dbeafe;color:var(--elgiganten)}
    .badge-power{background:var(--red-bg);color:var(--power)}
    .badge-tretti{background:var(--green-bg);color:var(--tretti)}
    .tema-badge{display:inline-block;background:#fef9c3;color:#92400e;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:600}

    /* ── SAVING ──────────────────────────────────────────────── */
    .saving-pct{display:inline-block;padding:2px 7px;border-radius:10px;font-weight:700;font-size:12px}
    .saving-high{background:var(--green-bg);color:var(--green)}
    .saving-mid{background:#fef9c3;color:#854d0e}
    .saving-low{background:var(--gray-100);color:var(--gray-600)}
    .win-badge{display:inline-block;background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:4px}

    /* ── DETAIL PANEL ────────────────────────────────────────── */
    .detail-row td{padding:0!important;border:none!important}
    .detail-panel{background:var(--gray-100);padding:14px 20px;border-bottom:2px solid var(--blue-mid);display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px 16px;font-size:12px}
    .dp-label{color:var(--gray-400);font-size:11px}
    .dp-val{font-weight:600}
    .dp-url a{color:var(--blue-mid);font-size:11px;word-break:break-all}

    /* ── PAGINATION ──────────────────────────────────────────── */
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 16px;border-top:1px solid var(--gray-100);flex-wrap:wrap}
    .page-btn{padding:5px 11px;border:1px solid var(--gray-200);border-radius:6px;cursor:pointer;font-size:13px;background:#fff;color:var(--gray-600);transition:all .15s}
    .page-btn:hover:not(:disabled){background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue-mid)}
    .page-btn.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);font-weight:700}
    .page-btn:disabled{opacity:.4;cursor:default}

    /* ── CHARTS ──────────────────────────────────────────────── */
    .charts-section{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
    .chart-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .chart-card h3{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px}
    .chart-card canvas{max-height:220px}

    /* ── PRISJÄMFÖRELSE ──────────────────────────────────────── */
    .jmf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
    .jmf-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;border-left:4px solid var(--tretti)}
    .jmf-card h3{font-size:13px;font-weight:700;margin-bottom:4px}
    .jmf-card h3 a{color:var(--gray-800);text-decoration:none}
    .jmf-card h3 a:hover{color:var(--blue-mid);text-decoration:underline}
    .jmf-prices{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;align-items:center}
    .jmf-price .store{font-size:11px;font-weight:600}
    .jmf-price .pris{font-weight:700}
    .jmf-price.winner .pris{color:var(--green);font-size:15px}
    .jmf-saving{font-size:12px;color:var(--green);font-weight:600;margin-left:8px}

    /* ── EMPTY ───────────────────────────────────────────────── */
    .empty-state{padding:48px 16px;text-align:center;color:var(--gray-400)}
    .empty-state div{font-size:36px;margin-bottom:8px}

    @media(max-width:600px){
      header h1 span{display:none}
      .tab-btn{font-size:12px;padding:10px 4px}
      .kpi-value{font-size:22px}
    }
  </style>
</head>
<body>

<!-- ── LOGIN GATE ──────────────────────────────────────────────── -->
<div id="login-gate">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <div class="login-title">Vitvaror Dashboard</div>
    <div class="login-sub">Kampanjövervakning · Prisanalys · Konkurrentbevakning</div>
    <input type="password" class="login-input" id="pw-input" placeholder="Ange lösenord"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-btn" onclick="checkPw()">Logga in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <h1>Vitvaror Kampanjdashboard <span>live från Google Sheets</span></h1>
  <span id="last-updated">Laddar…</span>
  <button id="btn-refresh" onclick="loadData()">↻ Uppdatera</button>
</header>

<div id="loading"><div class="spinner"></div><div>Hämtar data…</div></div>
<div id="error-msg"></div>

<main id="main-content" style="display:none">
  <div class="kpi-row" id="kpi-row"></div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('kampanjer')" id="tab-kampanjer">
      🏷️ Kampanjer <span class="tab-count" id="cnt-kampanjer">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('alla')" id="tab-alla">
      📦 Alla produkter <span class="tab-count" id="cnt-alla">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('jmf')" id="tab-jmf">
      🏆 Tretti vinner <span class="tab-count" id="cnt-jmf">0</span>
    </button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <input type="text" id="search-input" placeholder="🔍  Sök produkt, märke, modell…" oninput="applyFilters()">
    <select id="filter-butik" onchange="applyFilters()">
      <option value="">Alla butiker</option>
      <option value="elgiganten">Elgiganten</option>
      <option value="power">Power</option>
      <option value="tretti">Tretti</option>
    </select>
    <select id="filter-kategori" onchange="applyFilters()"><option value="">Alla kategorier</option></select>
    <select id="filter-varumarke" onchange="applyFilters()"><option value="">Alla varumärken</option></select>
    <input type="number" id="filter-rabatt" placeholder="Min % rabatt" min="0" max="100" oninput="applyFilters()">
    <label style="font-size:12px;color:var(--gray-600);display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="filter-featured" onchange="applyFilters()"> ★ Framhävda
    </label>
    <button id="btn-clear" onclick="clearFilters()">✕ Rensa</button>
    <span id="result-info"></span>
  </div>

  <div class="table-wrapper" id="table-wrapper">
    <div class="table-scroll">
      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="jmf-section" style="display:none">
    <div class="jmf-grid" id="jmf-grid"></div>
  </div>

  <div class="charts-section" id="charts-section">
    <div class="chart-card"><h3>Produkter per butik</h3><canvas id="chart-butik"></canvas></div>
    <div class="chart-card"><h3>Kampanjer per kategori (topp 10)</h3><canvas id="chart-kategori"></canvas></div>
    <div class="chart-card"><h3>Rabattfördelning (%)</h3><canvas id="chart-rabatt"></canvas></div>
  </div>
</main>

<script>
// ─── AUTH ─────────────────────────────────────────────────────────────────
const PW_HASH = "748afecc748afecc"; // obfuskerat — kontrolleras med checkPw()
const PW_KEY  = "vv_auth";

function simpleHash(s) {
  let h = 0x12345678;
  for (let i = 0; i < s.length; i++) h = Math.imul(h ^ s.charCodeAt(i), 0x9e3779b9) >>> 0;
  return h.toString(16).padStart(8,"0").repeat(2);
}

function checkPw() {
  const pw = document.getElementById("pw-input").value;
  if (simpleHash(pw) === PW_HASH) {
    sessionStorage.setItem(PW_KEY, "1");
    document.getElementById("login-gate").classList.add("fade-out");
    setTimeout(() => { document.getElementById("login-gate").remove(); loadData(); }, 400);
  } else {
    const el = document.getElementById("login-error");
    el.textContent = "Fel lösenord — försök igen.";
    document.getElementById("pw-input").select();
    setTimeout(() => { el.textContent = ""; }, 2500);
  }
}

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(PW_KEY) === "1") {
  document.getElementById("login-gate").remove();
  document.addEventListener("DOMContentLoaded", loadData);
}

// ─── CONFIG ───────────────────────────────────────────────────────────────
const CSV_URLS = {
  kampanjer:      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=59725059&single=true&output=csv",
  alla:           "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=979169503&single=true&output=csv",
  sammanfattning: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=1788301123&single=true&output=csv",
};
const PAGE_SIZE = 50;

// ─── STATE ────────────────────────────────────────────────────────────────
let state = {
  kampanjer:[], alla:[], sammanfattning:[], jmf:[],
  activeTab:"kampanjer", filtered:[],
  sort:{col:null,dir:"asc"}, page:1, charts:{}, openRow:null,
};

// ─── COLUMN MAP ───────────────────────────────────────────────────────────
const COL = {
  BUTIK:"Butik",NAMN:"Namn",VARUMARKE:"Varumärke",PRODUKTTYP:"Produkttyp",
  KATEGORI:"Kategori",UNDERKATEGORI:"Underkategori",
  KPRIS:"Kampanjpris (kr)",OPRIS:"Ordinariepris (kr)",
  BESPARING:"Besparing (kr)",BESPARING_PCT:"Besparing (%)",
  EAN:"EAN",ARTNR:"Artikelnummer (tillv)",SKU:"SKU",MODELL:"Modell",
  ENERGI:"Energiklass",KAP:"Kapacitet (kg)",
  HOJD:"Höjd (cm)",BREDD:"Bredd (cm)",DJUP:"Djup (cm)",
  VOLYM:"Volym (liter)",KSLUT:"Kampanjslut",URL:"URL",
  TEMA:"Kampanjtema",FEATURED:"Framhävd",
};

const VISIBLE_COLS = [
  {key:COL.BUTIK,     label:"Butik",       w:"90px"},
  {key:COL.NAMN,      label:"Produkt",     w:"280px"},
  {key:COL.VARUMARKE, label:"Märke",       w:"90px"},
  {key:COL.KATEGORI,  label:"Kategori",    w:"110px"},
  {key:COL.KPRIS,     label:"Kampanjpris", w:"100px",num:true},
  {key:COL.OPRIS,     label:"Ord.pris",    w:"90px", num:true},
  {key:COL.BESPARING, label:"Besparing",   w:"90px", num:true},
  {key:COL.BESPARING_PCT,label:"Rabatt",   w:"80px", num:true},
  {key:COL.ENERGI,    label:"Energi",      w:"70px"},
  {key:COL.KAP,       label:"Kapacitet",   w:"80px", num:true},
  {key:COL.KSLUT,     label:"Kampanjslut", w:"100px"},
];

// ─── CSV PARSING ──────────────────────────────────────────────────────────
function parseProductCSV(text) {
  const rows = Papa.parse(text, {skipEmptyLines:false}).data;
  if (rows.length < 3) return {rows:[],updatedAt:""};
  const updatedAt = rows[0][0] || "";
  const headers   = rows[2];
  return {
    headers, updatedAt,
    rows: rows.slice(3)
      .filter(r => r.some(c => c.trim() !== ""))
      .map(r => { const o={}; headers.forEach((h,i)=>{ o[h]=(r[i]||"").trim(); }); return o; }),
  };
}
function parseSumCSV(text) {
  return Papa.parse(text,{skipEmptyLines:true}).data.slice(1);
}

// ─── FETCH ────────────────────────────────────────────────────────────────
async function fetchCSV(url) {
  const r = await fetch(url, {cache:"no-store"});
  if (!r.ok) throw new Error("HTTP "+r.status);
  return r.text();
}

async function loadData() {
  document.getElementById("loading").style.display = "flex";
  document.getElementById("main-content").style.display = "none";
  document.getElementById("error-msg").style.display = "none";
  document.getElementById("btn-refresh").disabled = true;
  try {
    const [tK, tA, tS] = await Promise.all([
      fetchCSV(CSV_URLS.kampanjer), fetchCSV(CSV_URLS.alla), fetchCSV(CSV_URLS.sammanfattning),
    ]);
    const pK = parseProductCSV(tK), pA = parseProductCSV(tA);
    state.kampanjer = pK.rows; state.alla = pA.rows;
    state.sammanfattning = parseSumCSV(tS);
    state.jmf = computeJMF(state.alla);

    const ts = (pK.updatedAt||"").replace("Uppdaterad: ","");
    document.getElementById("last-updated").textContent = ts ? "Uppdaterad: "+ts.substring(0,16).replace("T"," ") : "";
    document.getElementById("cnt-kampanjer").textContent = state.kampanjer.length;
    document.getElementById("cnt-alla").textContent      = state.alla.length;
    document.getElementById("cnt-jmf").textContent       = state.jmf.length;

    populateDropdowns();
    renderKPIs();
    renderCharts();
    switchTab(state.activeTab, true);
    document.getElementById("loading").style.display = "none";
    document.getElementById("main-content").style.display = "block";
  } catch(err) {
    document.getElementById("loading").style.display = "none";
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.innerHTML = `<strong>Kunde inte hämta data.</strong><br><small>${err.message}</small><br><br>
      <button onclick="loadData()" style="margin-top:8px;padding:8px 16px;background:#003087;color:#fff;border:none;border-radius:6px;cursor:pointer">Försök igen</button>`;
  }
  document.getElementById("btn-refresh").disabled = false;
}

// ─── PRISJÄMFÖRELSE ───────────────────────────────────────────────────────
function computeJMF(products) {
  const eanMap = {};
  products.forEach(p => {
    const ean = (p[COL.EAN]||"").trim();
    const butik = (p[COL.BUTIK]||"").toLowerCase();
    const pris = parseFloat(p[COL.KPRIS])||0;
    if (!ean||pris<=0) return;
    if (!eanMap[ean]) eanMap[ean]={};
    if (!eanMap[ean][butik]||pris<eanMap[ean][butik].pris)
      eanMap[ean][butik]={pris,obj:p};
  });
  const winners=[];
  Object.values(eanMap).forEach(b=>{
    if (!b.tretti) return;
    const kk=Object.entries(b).filter(([s])=>s!=="tretti");
    if (!kk.length) return;
    const minK=Math.min(...kk.map(([,v])=>v.pris));
    if (b.tretti.pris<=minK)
      winners.push({tretti:b.tretti,konkurrenter:b,besparing:minK-b.tretti.pris,minKonk:minK});
  });
  return winners.sort((a,b)=>b.besparing-a.besparing);
}

// ─── KPI ──────────────────────────────────────────────────────────────────
function renderKPIs() {
  const m={};
  state.sammanfattning.forEach(r=>{ if(r[0]) m[r[0]]=r[1]; });
  const cards=[
    {label:"Totalt produkter", value:m["Totalt antal produkter"]||state.alla.length, sub:"från alla butiker", cls:""},
    {label:"Kampanjprodukter", value:m["Antal kampanjprodukter (besparing > 0)"]||state.kampanjer.length, sub:"med aktiv rabatt", cls:"orange"},
    {label:"Tretti vinner",    value:state.jmf.length, sub:"lägst pris vs konkurrenter", cls:"green"},
    {label:"Senast kört",      value:(m["Senaste körning"]||"–").substring(0,10), sub:"körningsdatum", cls:"red"},
  ];
  document.getElementById("kpi-row").innerHTML=cards.map(c=>`
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join("");
}

// ─── DROPDOWNS ────────────────────────────────────────────────────────────
function populateDropdowns() {
  const kats=[...new Set(state.alla.map(p=>p[COL.KATEGORI]).filter(Boolean))].sort();
  const vars=[...new Set(state.alla.map(p=>p[COL.VARUMARKE]).filter(Boolean))].sort();
  document.getElementById("filter-kategori").innerHTML=
    `<option value="">Alla kategorier</option>`+kats.map(k=>`<option>${k}</option>`).join("");
  document.getElementById("filter-varumarke").innerHTML=
    `<option value="">Alla varumärken</option>`+vars.map(v=>`<option>${v}</option>`).join("");
}

// ─── TABS ─────────────────────────────────────────────────────────────────
function switchTab(tab, force) {
  if (tab===state.activeTab&&!force) return;
  state.activeTab=tab; state.page=1; state.openRow=null;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  const isJMF=tab==="jmf";
  document.getElementById("filter-bar").style.display    = isJMF?"none":"flex";
  document.getElementById("table-wrapper").style.display = isJMF?"none":"block";
  document.getElementById("jmf-section").style.display   = isJMF?"block":"none";
  document.getElementById("charts-section").style.display= isJMF?"none":"grid";
  isJMF ? renderJMF() : applyFilters();
}

// ─── FILTERS ──────────────────────────────────────────────────────────────
function applyFilters() {
  const src = state.activeTab==="kampanjer" ? state.kampanjer : state.alla;
  const search = document.getElementById("search-input").value.toLowerCase();
  const butik  = document.getElementById("filter-butik").value.toLowerCase();
  const kat    = document.getElementById("filter-kategori").value;
  const var_   = document.getElementById("filter-varumarke").value;
  const minPct = parseFloat(document.getElementById("filter-rabatt").value)||0;
  const onlyFeatured = document.getElementById("filter-featured").checked;

  state.filtered=src.filter(p=>{
    if (butik && (p[COL.BUTIK]||"").toLowerCase()!==butik) return false;
    if (kat   && (p[COL.KATEGORI]||"")!==kat)  return false;
    if (var_  && (p[COL.VARUMARKE]||"")!==var_) return false;
    if (minPct && (parseFloat(p[COL.BESPARING_PCT])||0)<minPct) return false;
    if (onlyFeatured && (p[COL.FEATURED]||"").toLowerCase()!=="ja") return false;
    if (search) {
      const h=[p[COL.NAMN],p[COL.VARUMARKE],p[COL.MODELL],p[COL.KATEGORI],p[COL.TEMA]].join(" ").toLowerCase();
      if (!h.includes(search)) return false;
    }
    return true;
  });

  if (state.sort.col) {
    const col=state.sort.col, dir=state.sort.dir==="asc"?1:-1;
    const isNum=VISIBLE_COLS.find(c=>c.key===col)?.num;
    state.filtered.sort((a,b)=>{
      let va=a[col]||"", vb=b[col]||"";
      if(isNum){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
      return va<vb?-dir:va>vb?dir:0;
    });
  }
  state.page=1; state.openRow=null;
  document.getElementById("result-info").textContent=`${state.filtered.length} av ${src.length} produkter`;
  renderTable();
}

function clearFilters() {
  ["search-input","filter-butik","filter-kategori","filter-varumarke","filter-rabatt"].forEach(id=>{
    document.getElementById(id).value="";
  });
  document.getElementById("filter-featured").checked=false;
  applyFilters();
}

// ─── TABLE ────────────────────────────────────────────────────────────────
function renderTable() {
  const thead=document.getElementById("table-head");
  const tbody=document.getElementById("table-body");
  thead.innerHTML=`<tr>${VISIBLE_COLS.map(c=>{
    const s=state.sort.col===c.key?(state.sort.dir==="asc"?"sort-asc":"sort-desc"):"";
    return `<th class="${s}" style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join("")}<th style="width:32px"></th></tr>`;

  const total=state.filtered.length, pages=Math.ceil(total/PAGE_SIZE);
  const start=(state.page-1)*PAGE_SIZE;
  const pageData=state.filtered.slice(start,start+PAGE_SIZE);

  if (!pageData.length) {
    tbody.innerHTML=`<tr><td colspan="${VISIBLE_COLS.length+1}"><div class="empty-state"><div>🔍</div>Inga produkter matchar.</div></td></tr>`;
  } else {
    tbody.innerHTML=pageData.map((p,i)=>{
      const idx=start+i, isOpen=state.openRow===idx;
      return productRow(p,idx,isOpen)+(isOpen?detailRow(p,VISIBLE_COLS.length+1):"");
    }).join("");
  }
  renderPagination(pages);
}

function productRow(p,idx,isOpen) {
  const butik=(p[COL.BUTIK]||"").toLowerCase();
  const kpris=parseFloat(p[COL.KPRIS])||0;
  const opris=parseFloat(p[COL.OPRIS])||0;
  const bespar=parseFloat(p[COL.BESPARING])||0;
  const besparPct=parseFloat(p[COL.BESPARING_PCT])||0;
  const featured=(p[COL.FEATURED]||"").toLowerCase()==="ja";
  const tema=p[COL.TEMA]||"";

  const savCls=besparPct>=30?"saving-high":besparPct>=10?"saving-mid":"saving-low";
  const rowCls=featured?"featured":"";
  const temaHtml=tema?`<span class="tema-badge">${tema}</span>`:"";

  return `<tr class="${rowCls}${isOpen?" featured":""}" onclick="toggleDetail(${idx})" style="cursor:pointer">
    <td><span class="badge badge-${butik}">${p[COL.BUTIK]||"–"}</span></td>
    <td><strong>${p[COL.NAMN]||"–"}</strong>${temaHtml}</td>
    <td>${p[COL.VARUMARKE]||"–"}</td>
    <td>${p[COL.KATEGORI]||"–"}</td>
    <td class="num">${kpris?kpris.toLocaleString("sv-SE")+" kr":"–"}</td>
    <td class="num">${opris?opris.toLocaleString("sv-SE")+" kr":"–"}</td>
    <td class="num">${bespar?bespar.toLocaleString("sv-SE")+" kr":"–"}</td>
    <td class="num">${besparPct?`<span class="saving-pct ${savCls}">${besparPct}%</span>`:"–"}</td>
    <td>${p[COL.ENERGI]||"–"}</td>
    <td class="num">${p[COL.KAP]?p[COL.KAP]+" kg":"–"}</td>
    <td>${p[COL.KSLUT]||"–"}</td>
    <td style="text-align:center;color:var(--gray-400)">${isOpen?"▲":"▼"}</td>
  </tr>`;
}

function detailRow(p,colSpan) {
  const fields=[
    {l:"Produkttyp",   v:p[COL.PRODUKTTYP]},
    {l:"Underkategori",v:p[COL.UNDERKATEGORI]},
    {l:"Modell",       v:p[COL.MODELL]},
    {l:"EAN",          v:p[COL.EAN]},
    {l:"Art.nr",       v:p[COL.ARTNR]},
    {l:"SKU",          v:p[COL.SKU]},
    {l:"Höjd",         v:p[COL.HOJD]?p[COL.HOJD]+" cm":""},
    {l:"Bredd",        v:p[COL.BREDD]?p[COL.BREDD]+" cm":""},
    {l:"Djup",         v:p[COL.DJUP]?p[COL.DJUP]+" cm":""},
    {l:"Volym",        v:p[COL.VOLYM]?p[COL.VOLYM]+" L":""},
    {l:"Kampanjtema",  v:p[COL.TEMA]},
    {l:"Framhävd",     v:p[COL.FEATURED]},
  ].filter(f=>f.v);
  const urlHtml=p[COL.URL]?`<div><div class="dp-label">Länk</div><div class="dp-val dp-url"><a href="${p[COL.URL]}" target="_blank">Öppna produktsida ↗</a></div></div>`:"";
  return `<tr class="detail-row"><td colspan="${colSpan}">
    <div class="detail-panel">
      ${fields.map(f=>`<div><div class="dp-label">${f.l}</div><div class="dp-val">${f.v}</div></div>`).join("")}
      ${urlHtml}
    </div>
  </td></tr>`;
}

function toggleDetail(idx){ state.openRow=state.openRow===idx?null:idx; renderTable(); }

// ─── SORT ─────────────────────────────────────────────────────────────────
function sortBy(col){
  state.sort.dir=state.sort.col===col?(state.sort.dir==="asc"?"desc":"asc"):"asc";
  state.sort.col=col; state.page=1; state.openRow=null; applyFilters();
}

// ─── PAGINATION ───────────────────────────────────────────────────────────
function renderPagination(pages){
  const p=document.getElementById("pagination");
  if(pages<=1){p.innerHTML="";return;}
  const cur=state.page;
  let btns=`<button class="page-btn" onclick="goPage(${cur-1})" ${cur<=1?"disabled":""}>‹</button>`;
  const range=[];
  if(pages<=7){for(let i=1;i<=pages;i++)range.push(i);}
  else{
    range.push(1);if(cur>3)range.push("…");
    for(let i=Math.max(2,cur-1);i<=Math.min(pages-1,cur+1);i++)range.push(i);
    if(cur<pages-2)range.push("…");range.push(pages);
  }
  range.forEach(r=>{
    if(r==="…")btns+=`<span style="padding:5px;color:var(--gray-400)">…</span>`;
    else btns+=`<button class="page-btn ${r===cur?"active":""}" onclick="goPage(${r})">${r}</button>`;
  });
  btns+=`<button class="page-btn" onclick="goPage(${cur+1})" ${cur>=pages?"disabled":""}>›</button>`;
  p.innerHTML=btns;
}
function goPage(n){
  state.page=n;state.openRow=null;renderTable();
  window.scrollTo({top:document.getElementById("table-wrapper").offsetTop-80,behavior:"smooth"});
}

// ─── PRISJÄMFÖRELSE ───────────────────────────────────────────────────────
function renderJMF(){
  const grid=document.getElementById("jmf-grid");
  if(!state.jmf.length){
    grid.innerHTML=`<div class="empty-state"><div>🏆</div>Ingen jämförelsedata.</div>`;return;
  }
  grid.innerHTML=state.jmf.map(item=>{
    const t=item.tretti.obj;
    const trettiPris=item.tretti.pris;
    const besparPct=item.minKonk>0?Math.round(item.besparing/item.minKonk*100):0;
    const konk=Object.entries(item.konkurrenter).map(([butik,v])=>{
      const cls=butik==="elgiganten"?"badge-elgiganten":"badge-power";
      return `<div class="jmf-price"><div class="store"><span class="badge ${cls}">${butik}</span></div>
        <div class="pris">${v.pris.toLocaleString("sv-SE")} kr</div></div>`;
    }).join("");
    return `<div class="jmf-card">
      <h3><a href="${t[COL.URL]||"#"}" target="_blank">${t[COL.NAMN]||"–"}</a>
        <span class="win-badge">-${besparPct}%</span></h3>
      <div class="jmf-prices">
        <div class="jmf-price winner">
          <div class="store"><span class="badge badge-tretti">Tretti</span></div>
          <div class="pris">${trettiPris.toLocaleString("sv-SE")} kr ✓</div>
        </div>
        ${konk}
        ${item.besparing>0?`<span class="jmf-saving">Sparar ${item.besparing.toLocaleString("sv-SE")} kr</span>`:""}
      </div>
    </div>`;
  }).join("");
}

// ─── CHARTS ───────────────────────────────────────────────────────────────
function renderCharts(){
  Object.values(state.charts).forEach(c=>c.destroy());state.charts={};

  const butikCount={};
  state.alla.forEach(p=>{ const b=p[COL.BUTIK]||"?"; butikCount[b]=(butikCount[b]||0)+1; });
  const bLabels=Object.keys(butikCount);
  const bColors=bLabels.map(b=>b.toLowerCase()==="elgiganten"?"#003087":b.toLowerCase()==="power"?"#cc0000":"#007a3d");
  state.charts.butik=new Chart(document.getElementById("chart-butik"),{
    type:"doughnut",
    data:{labels:bLabels,datasets:[{data:Object.values(butikCount),backgroundColor:bColors,borderWidth:2,borderColor:"#fff"}]},
    options:{plugins:{legend:{position:"bottom",labels:{font:{size:12}}}},responsive:true,maintainAspectRatio:true}
  });

  const katCount={};
  state.kampanjer.forEach(p=>{ const k=p[COL.KATEGORI]||"Övrigt"; katCount[k]=(katCount[k]||0)+1; });
  const sortedKat=Object.entries(katCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  state.charts.kategori=new Chart(document.getElementById("chart-kategori"),{
    type:"bar",
    data:{labels:sortedKat.map(([k])=>k),datasets:[{data:sortedKat.map(([,v])=>v),backgroundColor:"#1a56db",borderRadius:4}]},
    options:{indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{font:{size:11}}}},responsive:true,maintainAspectRatio:true}
  });

  const buckets=[0,0,0,0,0,0];
  state.kampanjer.forEach(p=>{
    const pct=parseFloat(p[COL.BESPARING_PCT])||0;
    if(pct<10)buckets[0]++;else if(pct<20)buckets[1]++;else if(pct<30)buckets[2]++;
    else if(pct<40)buckets[3]++;else if(pct<50)buckets[4]++;else buckets[5]++;
  });
  state.charts.rabatt=new Chart(document.getElementById("chart-rabatt"),{
    type:"bar",
    data:{labels:["0–9%","10–19%","20–29%","30–39%","40–49%","50%+"],
      datasets:[{data:buckets,backgroundColor:["#94a3b8","#60a5fa","#3b82f6","#f59e0b","#f97316","#16a34a"],borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{precision:0}}},responsive:true,maintainAspectRatio:true}
  });
}
</script>
