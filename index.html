<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitvaror Kampanjdashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --blue-dark:  #003087;
      --blue-mid:   #1a56db;
      --blue-light: #e8f0fe;
      --elgiganten: #003087;
      --power:      #cc0000;
      --tretti:     #007a3d;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --orange:     #ea580c;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-400:   #94a3b8;
      --gray-600:   #475569;
      --gray-800:   #1e293b;
      --white:      #ffffff;
      --shadow:     0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
      --shadow-md:  0 4px 6px rgba(0,0,0,.1);
      --radius:     8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--gray-100); color: var(--gray-800); font-size: 14px; }

    /* HEADER */
    header {
      background: var(--blue-dark);
      color: var(--white);
      padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
      height: 56px; position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-md);
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; flex: 1; }
    header h1 span { font-weight: 400; opacity: .7; font-size: 13px; margin-left: 8px; }
    #last-updated { font-size: 12px; opacity: .7; white-space: nowrap; }
    #btn-refresh {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: var(--white); padding: 6px 14px; border-radius: 20px;
      cursor: pointer; font-size: 13px; transition: background .2s;
    }
    #btn-refresh:hover { background: rgba(255,255,255,.25); }

    /* LOADING */
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60vh; gap: 16px; color: var(--gray-600);
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--gray-200);
      border-top-color: var(--blue-mid); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { display: none; color: var(--red); padding: 32px; text-align: center; }

    /* MAIN LAYOUT */
    main { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

    /* KPI CARDS */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--white); border-radius: var(--radius);
      padding: 16px 20px; box-shadow: var(--shadow);
      border-left: 4px solid var(--blue-mid);
    }
    .kpi-card.green  { border-color: var(--green); }
    .kpi-card.red    { border-color: var(--power); }
    .kpi-card.orange { border-color: var(--orange); }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
                 color: var(--gray-400); margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 700; color: var(--gray-800); line-height: 1; }
    .kpi-sub   { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

    /* TABS */
    .tab-bar {
      display: flex; gap: 0; background: var(--white);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1; padding: 12px 8px; text-align: center;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--gray-600); border: none; background: transparent;
      border-bottom: 3px solid transparent; transition: all .2s;
    }
    .tab-btn:hover { background: var(--gray-100); color: var(--gray-800); }
    .tab-btn.active {
      color: var(--blue-mid); border-bottom-color: var(--blue-mid);
      background: var(--blue-light);
    }
    .tab-count {
      display: inline-block; background: var(--gray-200);
      color: var(--gray-600); font-size: 11px; padding: 1px 6px;
      border-radius: 10px; margin-left: 4px; vertical-align: middle;
    }
    .tab-btn.active .tab-count { background: var(--blue-mid); color: var(--white); }

    /* FILTERS */
    .filter-bar {
      background: var(--white); border-radius: var(--radius);
      padding: 12px 16px; box-shadow: var(--shadow);
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 12px;
    }
    .filter-bar input, .filter-bar select {
      padding: 7px 12px; border: 1px solid var(--gray-200);
      border-radius: 6px; font-size: 13px; color: var(--gray-800);
      background: var(--white); outline: none; transition: border-color .2s;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--blue-mid); }
    #search-input { flex: 1; min-width: 180px; }
    .filter-bar select { min-width: 130px; }
    #filter-rabatt { width: 90px; }
    #btn-clear {
      padding: 7px 14px; background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--gray-600);
      transition: background .2s;
    }
    #btn-clear:hover { background: var(--gray-200); }
    #result-info { font-size: 12px; color: var(--gray-400); margin-left: auto; white-space: nowrap; }

    /* TABLE WRAPPER */
    .table-wrapper {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--blue-dark); color: var(--white); }
    thead th {
      padding: 10px 12px; text-align: left; font-weight: 600;
      white-space: nowrap; cursor: pointer; user-select: none;
      position: relative;
    }
    thead th:hover { background: #0040a8; }
    thead th.sort-asc::after  { content: " ▲"; font-size: 10px; opacity: .8; }
    thead th.sort-desc::after { content: " ▼"; font-size: 10px; opacity: .8; }
    tbody tr { border-bottom: 1px solid var(--gray-100); transition: background .1s; }
    tbody tr:hover { background: var(--blue-light); }
    tbody td { padding: 9px 12px; vertical-align: middle; }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* STORE BADGE */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 600; text-transform: capitalize;
    }
    .badge-elgiganten { background: #dbeafe; color: var(--elgiganten); }
    .badge-power      { background: var(--red-bg); color: var(--power); }
    .badge-tretti     { background: var(--green-bg); color: var(--tretti); }

    /* SAVING */
    .saving-pct {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-weight: 700; font-size: 12px;
    }
    .saving-high { background: var(--green-bg); color: var(--green); }
    .saving-mid  { background: #fef9c3; color: #854d0e; }
    .saving-low  { background: var(--gray-100); color: var(--gray-600); }

    /* WINNER BADGE */
    .win-badge {
      display: inline-block; background: var(--green-bg);
      color: var(--green); font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px; margin-left: 4px;
    }

    /* PAGINATION */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 14px 16px; border-top: 1px solid var(--gray-100);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 5px 11px; border: 1px solid var(--gray-200);
      border-radius: 6px; cursor: pointer; font-size: 13px;
      background: var(--white); color: var(--gray-600); transition: all .15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }
    .page-btn.active { background: var(--blue-dark); color: var(--white); border-color: var(--blue-dark); font-weight: 700; }
    .page-btn:disabled { opacity: .4; cursor: default; }
    #page-info { font-size: 12px; color: var(--gray-400); margin: 0 8px; }

    /* CHARTS */
    .charts-section {
      margin-top: 20px; display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .chart-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px;
    }
    .chart-card h3 { font-size: 13px; font-weight: 600; color: var(--gray-600);
                     margin-bottom: 12px; text-transform: uppercase; letter-spacing: .4px; }
    .chart-card canvas { max-height: 220px; }

    /* PRISJÄMFÖRELSE */
    .jmf-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px 20px;
      border-left: 4px solid var(--tretti);
      margin-bottom: 12px;
    }
    .jmf-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .jmf-card h3 a { color: var(--gray-800); text-decoration: none; }
    .jmf-card h3 a:hover { color: var(--blue-mid); text-decoration: underline; }
    .jmf-prices { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; align-items: center; }
    .jmf-price { font-size: 13px; }
    .jmf-price .store { font-size: 11px; font-weight: 600; }
    .jmf-price .pris { font-weight: 700; }
    .jmf-price.winner .pris { color: var(--green); font-size: 15px; }
    .jmf-saving { font-size: 12px; color: var(--green); font-weight: 600; margin-left: 8px; }
    .jmf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    /* PRODUCT DETAIL PANEL */
    .detail-row td { padding: 0 !important; border: none !important; }
    .detail-panel {
      background: var(--gray-100); padding: 14px 20px;
      border-bottom: 2px solid var(--blue-mid);
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px 16px; font-size: 12px;
    }
    .detail-panel .dp-item { }
    .detail-panel .dp-label { color: var(--gray-400); font-size: 11px; }
    .detail-panel .dp-val { font-weight: 600; }
    .detail-panel .dp-url a { color: var(--blue-mid); font-size: 11px; word-break: break-all; }

    /* EMPTY STATE */
    .empty-state { padding: 48px 16px; text-align: center; color: var(--gray-400); }
    .empty-state div { font-size: 36px; margin-bottom: 8px; }

    /* NO DATA  */
    #no-data { display: none; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header h1 span { display: none; }
      .tab-btn { font-size: 12px; padding: 10px 4px; }
      .kpi-value { font-size: 22px; }
      .detail-panel { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Vitvaror Kampanjdashboard <span>live från Google Sheets</span></h1>
  <span id="last-updated">Laddar…</span>
  <button id="btn-refresh" onclick="loadData()">↻ Uppdatera</button>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div>Hämtar data från Google Sheets…</div>
</div>
<div id="error-msg"></div>

<main id="main-content" style="display:none">

  <!-- KPI CARDS -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('kampanjer')" id="tab-kampanjer">
      🏷️ Kampanjer <span class="tab-count" id="cnt-kampanjer">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('alla')" id="tab-alla">
      📦 Alla produkter <span class="tab-count" id="cnt-alla">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('jmf')" id="tab-jmf">
      🏆 Tretti vinner <span class="tab-count" id="cnt-jmf">0</span>
    </button>
  </div>

  <!-- FILTERS (döljs för jmf-tab) -->
  <div class="filter-bar" id="filter-bar">
    <input type="text" id="search-input" placeholder="🔍  Sök produkt, varumärke, modell…" oninput="applyFilters()">
    <select id="filter-butik" onchange="applyFilters()">
      <option value="">Alla butiker</option>
      <option value="elgiganten">Elgiganten</option>
      <option value="power">Power</option>
      <option value="tretti">Tretti</option>
    </select>
    <select id="filter-kategori" onchange="applyFilters()">
      <option value="">Alla kategorier</option>
    </select>
    <select id="filter-varumarke" onchange="applyFilters()">
      <option value="">Alla varumärken</option>
    </select>
    <input type="number" id="filter-rabatt" placeholder="Min % rabatt" min="0" max="100" oninput="applyFilters()">
    <button id="btn-clear" onclick="clearFilters()">✕ Rensa</button>
    <span id="result-info"></span>
  </div>

  <!-- PRODUCT TABLE -->
  <div class="table-wrapper" id="table-wrapper">
    <div class="table-scroll">
      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- PRISJÄMFÖRELSE -->
  <div id="jmf-section" style="display:none">
    <div class="jmf-grid" id="jmf-grid"></div>
  </div>

  <!-- CHARTS -->
  <div class="charts-section" id="charts-section">
    <div class="chart-card">
      <h3>Produkter per butik</h3>
      <canvas id="chart-butik"></canvas>
    </div>
    <div class="chart-card">
      <h3>Kampanjer per kategori (topp 10)</h3>
      <canvas id="chart-kategori"></canvas>
    </div>
    <div class="chart-card">
      <h3>Rabattfördelning (%)</h3>
      <canvas id="chart-rabatt"></canvas>
    </div>
  </div>

</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CSV_URLS = {
  kampanjer:      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=59725059&single=true&output=csv",
  alla:           "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=979169503&single=true&output=csv",
  sammanfattning: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfy9o1OyRThf_-5lOLIdq4jGqglCYa2WNNs4b92ooJRIXK41GYQhSGIqD8qeoWVcy_Iol3zSHlXRXN/pub?gid=1788301123&single=true&output=csv",
};

const PAGE_SIZE = 50;

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  kampanjer: [], alla: [], sammanfattning: [], jmf: [],
  activeTab: "kampanjer",
  filtered: [],
  sort: { col: null, dir: "asc" },
  page: 1,
  charts: {},
  openRow: null,
};

// ─── COLUMN DEFINITIONS ───────────────────────────────────────────────────────
// Matches KOLUMNER in sheets_export.py (row 3 in product sheets)
// CSV row 0 = metadata, row 1 = empty, row 2 = headers, row 3+ = data
const COL = {
  BUTIK: "Butik", NAMN: "Namn", VARUMARKE: "Varumärke",
  PRODUKTTYP: "Produkttyp", KATEGORI: "Kategori", UNDERKATEGORI: "Underkategori",
  KPRIS: "Kampanjpris (kr)", OPRIS: "Ordinariepris (kr)",
  BESPARING: "Besparing (kr)", BESPARING_PCT: "Besparing (%)",
  EAN: "EAN", ARTNR: "Artikelnummer (tillv)", SKU: "SKU", MODELL: "Modell",
  ENERGI: "Energiklass", KAP: "Kapacitet (kg)",
  HOJD: "Höjd (cm)", BREDD: "Bredd (cm)", DJUP: "Djup (cm)",
  VOLYM: "Volym (liter)", KSLUT: "Kampanjslut", URL: "URL",
};

// Columns shown in the main table
const VISIBLE_COLS = [
  { key: COL.BUTIK,       label: "Butik",          w: "90px"  },
  { key: COL.NAMN,        label: "Produkt",         w: "280px" },
  { key: COL.VARUMARKE,   label: "Märke",           w: "90px"  },
  { key: COL.KATEGORI,    label: "Kategori",        w: "110px" },
  { key: COL.KPRIS,       label: "Kampanjpris",     w: "100px", num: true },
  { key: COL.OPRIS,       label: "Ord.pris",        w: "90px",  num: true },
  { key: COL.BESPARING,   label: "Besparing",       w: "90px",  num: true },
  { key: COL.BESPARING_PCT, label: "Rabatt",        w: "80px",  num: true },
  { key: COL.ENERGI,      label: "Energi",          w: "70px"  },
  { key: COL.KAP,         label: "Kapacitet",       w: "80px",  num: true },
  { key: COL.KSLUT,       label: "Kampanjslut",     w: "100px" },
];

// ─── CSV PARSING ─────────────────────────────────────────────────────────────
function parseProductCSV(text) {
  // Row 0: metadata ("Uppdaterad: …"), Row 1: empty, Row 2: headers, Row 3+: data
  const result = Papa.parse(text, { skipEmptyLines: false });
  const rows = result.data;
  if (rows.length < 3) return { rows: [], headers: [], updatedAt: "" };

  const updatedAt = rows[0][0] || "";
  const headers   = rows[2];           // column names
  const dataRows  = rows.slice(3);     // actual data

  return {
    headers,
    updatedAt,
    rows: dataRows
      .filter(r => r.some(c => c.trim() !== ""))
      .map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (r[i] || "").trim(); });
        return obj;
      }),
  };
}

function parseSammanfattningCSV(text) {
  const result = Papa.parse(text, { skipEmptyLines: true });
  return result.data.slice(1);  // skip header row ["Statistik","Värde"]
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchCSV(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.text();
}

async function loadData() {
  document.getElementById("loading").style.display    = "flex";
  document.getElementById("main-content").style.display = "none";
  document.getElementById("error-msg").style.display  = "none";
  document.getElementById("btn-refresh").disabled      = true;

  try {
    const [txtK, txtA, txtS] = await Promise.all([
      fetchCSV(CSV_URLS.kampanjer),
      fetchCSV(CSV_URLS.alla),
      fetchCSV(CSV_URLS.sammanfattning),
    ]);

    const parsedK = parseProductCSV(txtK);
    const parsedA = parseProductCSV(txtA);

    state.kampanjer      = parsedK.rows;
    state.alla           = parsedA.rows;
    state.sammanfattning = parseSammanfattningCSV(txtS);
    state.jmf            = computeJMF(state.alla);

    const updatedAt = parsedK.updatedAt.replace("Uppdaterad: ", "") || parsedA.updatedAt;
    document.getElementById("last-updated").textContent = updatedAt ? "Uppdaterad: " + updatedAt.substring(0, 16).replace("T", " ") : "";

    // Update tab counts
    document.getElementById("cnt-kampanjer").textContent = state.kampanjer.length;
    document.getElementById("cnt-alla").textContent      = state.alla.length;
    document.getElementById("cnt-jmf").textContent       = state.jmf.length;

    populateFilterDropdowns();
    renderKPIs();
    renderCharts();
    switchTab(state.activeTab, true);

    document.getElementById("loading").style.display      = "none";
    document.getElementById("main-content").style.display = "block";

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    const el = document.getElementById("error-msg");
    el.style.display = "block";
    el.innerHTML = `<strong>Kunde inte hämta data från Google Sheets.</strong><br><small>${err.message}</small><br><br>
      <button onclick="loadData()" style="margin-top:8px;padding:8px 16px;background:#003087;color:#fff;border:none;border-radius:6px;cursor:pointer">Försök igen</button>`;
  }

  document.getElementById("btn-refresh").disabled = false;
}

// ─── PRISJÄMFÖRELSE COMPUTE ───────────────────────────────────────────────────
function computeJMF(products) {
  // Group by EAN → {butik: {pris, obj}}
  const eanMap = {};
  products.forEach(p => {
    const ean  = (p[COL.EAN] || "").trim();
    const butik = (p[COL.BUTIK] || "").toLowerCase();
    const pris  = parseFloat(p[COL.KPRIS]) || 0;
    if (!ean || pris <= 0) return;
    if (!eanMap[ean]) eanMap[ean] = {};
    if (!eanMap[ean][butik] || pris < eanMap[ean][butik].pris) {
      eanMap[ean][butik] = { pris, obj: p };
    }
  });

  const winners = [];
  Object.values(eanMap).forEach(butiker => {
    if (!butiker.tretti) return;
    const trettiPris = butiker.tretti.pris;
    const konkurrenter = Object.entries(butiker).filter(([b]) => b !== "tretti");
    if (konkurrenter.length === 0) return;
    const minKonk = Math.min(...konkurrenter.map(([, v]) => v.pris));
    if (trettiPris <= minKonk) {
      winners.push({ tretti: butiker.tretti, konkurrenter: butiker, besparing: minKonk - trettiPris, minKonk });
    }
  });

  return winners.sort((a, b) => b.besparing - a.besparing);
}

// ─── KPI CARDS ───────────────────────────────────────────────────────────────
function renderKPIs() {
  const sumMap = {};
  state.sammanfattning.forEach(row => { if (row[0]) sumMap[row[0]] = row[1]; });

  const cards = [
    { label: "Totalt produkter",  value: sumMap["Totalt antal produkter"]       || state.alla.length,      sub: "från alla butiker",      cls: "" },
    { label: "Kampanjprodukter",  value: sumMap["Antal kampanjprodukter (besparing > 0)"] || state.kampanjer.length, sub: "med aktiv rabatt",        cls: "orange" },
    { label: "Tretti vinner",     value: state.jmf.length,                                                  sub: "lägst pris vs konkurrenter", cls: "green" },
    { label: "Senast uppdaterad", value: (sumMap["Senaste körning"] || "–").substring(0, 10), sub: "körningsdatum", cls: "red" },
  ];

  document.getElementById("kpi-row").innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join("");
}

// ─── FILTER DROPDOWNS ────────────────────────────────────────────────────────
function populateFilterDropdowns() {
  const kategorier = [...new Set(state.alla.map(p => p[COL.KATEGORI]).filter(Boolean))].sort();
  const varumarken = [...new Set(state.alla.map(p => p[COL.VARUMARKE]).filter(Boolean))].sort();

  const selK = document.getElementById("filter-kategori");
  selK.innerHTML = `<option value="">Alla kategorier</option>` +
    kategorier.map(k => `<option value="${k}">${k}</option>`).join("");

  const selV = document.getElementById("filter-varumarke");
  selV.innerHTML = `<option value="">Alla varumärken</option>` +
    varumarken.map(v => `<option value="${v}">${v}</option>`).join("");
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab, force) {
  if (tab === state.activeTab && !force) return;
  state.activeTab = tab;
  state.page = 1;
  state.openRow = null;

  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");

  const isJMF = tab === "jmf";
  document.getElementById("filter-bar").style.display    = isJMF ? "none" : "flex";
  document.getElementById("table-wrapper").style.display = isJMF ? "none" : "block";
  document.getElementById("jmf-section").style.display   = isJMF ? "block" : "none";
  document.getElementById("charts-section").style.display = isJMF ? "none" : "grid";

  if (isJMF) {
    renderJMF();
  } else {
    applyFilters();
  }
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function applyFilters() {
  const src    = state.activeTab === "kampanjer" ? state.kampanjer : state.alla;
  const search = document.getElementById("search-input").value.toLowerCase();
  const butik  = document.getElementById("filter-butik").value.toLowerCase();
  const kat    = document.getElementById("filter-kategori").value;
  const var_   = document.getElementById("filter-varumarke").value;
  const minPct = parseFloat(document.getElementById("filter-rabatt").value) || 0;

  state.filtered = src.filter(p => {
    if (butik  && (p[COL.BUTIK]      || "").toLowerCase() !== butik) return false;
    if (kat    && (p[COL.KATEGORI]   || "") !== kat)  return false;
    if (var_   && (p[COL.VARUMARKE]  || "") !== var_) return false;
    if (minPct && (parseFloat(p[COL.BESPARING_PCT]) || 0) < minPct) return false;
    if (search) {
      const haystack = [p[COL.NAMN], p[COL.VARUMARKE], p[COL.MODELL], p[COL.KATEGORI]]
        .join(" ").toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Apply sort
  if (state.sort.col) {
    const col = state.sort.col;
    const dir = state.sort.dir === "asc" ? 1 : -1;
    const isNum = VISIBLE_COLS.find(c => c.key === col)?.num;
    state.filtered.sort((a, b) => {
      let va = a[col] || "", vb = b[col] || "";
      if (isNum) { va = parseFloat(va) || 0; vb = parseFloat(vb) || 0; }
      return va < vb ? -dir : va > vb ? dir : 0;
    });
  }

  state.page = 1;
  state.openRow = null;
  document.getElementById("result-info").textContent =
    `${state.filtered.length} av ${src.length} produkter`;
  renderTable();
}

function clearFilters() {
  document.getElementById("search-input").value    = "";
  document.getElementById("filter-butik").value    = "";
  document.getElementById("filter-kategori").value = "";
  document.getElementById("filter-varumarke").value = "";
  document.getElementById("filter-rabatt").value   = "";
  applyFilters();
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
function renderTable() {
  const thead = document.getElementById("table-head");
  const tbody = document.getElementById("table-body");

  // Header
  thead.innerHTML = `<tr>${VISIBLE_COLS.map(c => {
    const isSorted = state.sort.col === c.key;
    const cls = isSorted ? (state.sort.dir === "asc" ? "sort-asc" : "sort-desc") : "";
    return `<th class="${cls}" style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join("")}<th style="width:32px"></th></tr>`;

  // Pagination
  const total = state.filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (state.page - 1) * PAGE_SIZE;
  const pageData = state.filtered.slice(start, start + PAGE_SIZE);

  // Body
  if (pageData.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${VISIBLE_COLS.length + 1}">
      <div class="empty-state"><div>🔍</div>Inga produkter matchar filtren.</div>
    </td></tr>`;
  } else {
    tbody.innerHTML = pageData.map((p, i) => {
      const idx = start + i;
      const isOpen = state.openRow === idx;
      return productRow(p, idx, isOpen) + (isOpen ? detailRow(p, VISIBLE_COLS.length + 1) : "");
    }).join("");
  }

  renderPagination(pages);
}

function productRow(p, idx, isOpen) {
  const butik    = (p[COL.BUTIK] || "").toLowerCase();
  const kpris    = parseFloat(p[COL.KPRIS])         || 0;
  const opris    = parseFloat(p[COL.OPRIS])         || 0;
  const bespar   = parseFloat(p[COL.BESPARING])     || 0;
  const besparPct = parseFloat(p[COL.BESPARING_PCT]) || 0;

  const badgeCls = `badge badge-${butik}`;
  const savCls   = besparPct >= 30 ? "saving-high" : besparPct >= 10 ? "saving-mid" : "saving-low";

  return `<tr onclick="toggleDetail(${idx})" style="cursor:pointer;${isOpen ? "background:var(--blue-light)" : ""}">
    <td><span class="${badgeCls}">${p[COL.BUTIK] || "–"}</span></td>
    <td><strong>${p[COL.NAMN] || "–"}</strong></td>
    <td>${p[COL.VARUMARKE] || "–"}</td>
    <td>${p[COL.KATEGORI]  || "–"}</td>
    <td class="num">${kpris  ? kpris.toLocaleString("sv-SE")  + " kr" : "–"}</td>
    <td class="num">${opris  ? opris.toLocaleString("sv-SE")  + " kr" : "–"}</td>
    <td class="num">${bespar ? bespar.toLocaleString("sv-SE") + " kr" : "–"}</td>
    <td class="num">${besparPct ? `<span class="saving-pct ${savCls}">${besparPct}%</span>` : "–"}</td>
    <td>${p[COL.ENERGI] || "–"}</td>
    <td class="num">${p[COL.KAP] ? p[COL.KAP] + " kg" : "–"}</td>
    <td>${p[COL.KSLUT] || "–"}</td>
    <td style="text-align:center;color:var(--gray-400)">${isOpen ? "▲" : "▼"}</td>
  </tr>`;
}

function detailRow(p, colSpan) {
  const fields = [
    { l: "Produkttyp",   v: p[COL.PRODUKTTYP]  },
    { l: "Underkategori",v: p[COL.UNDERKATEGORI]},
    { l: "Modell",       v: p[COL.MODELL]       },
    { l: "EAN",          v: p[COL.EAN]          },
    { l: "Art.nr (tillv)",v: p[COL.ARTNR]       },
    { l: "SKU",          v: p[COL.SKU]          },
    { l: "Höjd",         v: p[COL.HOJD] ? p[COL.HOJD] + " cm" : "" },
    { l: "Bredd",        v: p[COL.BREDD] ? p[COL.BREDD] + " cm" : "" },
    { l: "Djup",         v: p[COL.DJUP]  ? p[COL.DJUP]  + " cm" : "" },
    { l: "Volym",        v: p[COL.VOLYM] ? p[COL.VOLYM] + " L" : "" },
    { l: "Kampanjslut",  v: p[COL.KSLUT]       },
  ].filter(f => f.v);

  const urlRow = p[COL.URL]
    ? `<div class="dp-item dp-url"><div class="dp-label">Länk</div><div class="dp-val"><a href="${p[COL.URL]}" target="_blank" rel="noopener">Öppna produktsida ↗</a></div></div>`
    : "";

  return `<tr class="detail-row"><td colspan="${colSpan}">
    <div class="detail-panel">
      ${fields.map(f => `<div class="dp-item"><div class="dp-label">${f.l}</div><div class="dp-val">${f.v}</div></div>`).join("")}
      ${urlRow}
    </div>
  </td></tr>`;
}

function toggleDetail(idx) {
  state.openRow = state.openRow === idx ? null : idx;
  renderTable();
}

// ─── SORT ────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (state.sort.col === col) {
    state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
  } else {
    state.sort.col = col;
    state.sort.dir = "asc";
  }
  state.page = 1;
  state.openRow = null;
  applyFilters();
}

// ─── PAGINATION ──────────────────────────────────────────────────────────────
function renderPagination(pages) {
  const p = document.getElementById("pagination");
  if (pages <= 1) { p.innerHTML = ""; return; }

  const cur = state.page;
  let btns = `<button class="page-btn" onclick="goPage(${cur - 1})" ${cur <= 1 ? "disabled" : ""}>‹</button>`;

  const range = [];
  if (pages <= 7) {
    for (let i = 1; i <= pages; i++) range.push(i);
  } else {
    range.push(1);
    if (cur > 3) range.push("…");
    for (let i = Math.max(2, cur - 1); i <= Math.min(pages - 1, cur + 1); i++) range.push(i);
    if (cur < pages - 2) range.push("…");
    range.push(pages);
  }

  range.forEach(r => {
    if (r === "…") btns += `<span id="page-info">…</span>`;
    else btns += `<button class="page-btn ${r === cur ? "active" : ""}" onclick="goPage(${r})">${r}</button>`;
  });

  btns += `<button class="page-btn" onclick="goPage(${cur + 1})" ${cur >= pages ? "disabled" : ""}>›</button>`;
  p.innerHTML = btns;
}

function goPage(n) {
  state.page = n;
  state.openRow = null;
  renderTable();
  window.scrollTo({ top: document.getElementById("table-wrapper").offsetTop - 80, behavior: "smooth" });
}

// ─── PRISJÄMFÖRELSE ───────────────────────────────────────────────────────────
function renderJMF() {
  const grid = document.getElementById("jmf-grid");
  if (state.jmf.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div>🏆</div>Ingen data tillgänglig för prisjämförelse.</div>`;
    return;
  }

  grid.innerHTML = state.jmf.map(item => {
    const t = item.tretti.obj;
    const namn  = t[COL.NAMN]      || "–";
    const url   = t[COL.URL]       || "";
    const trettiPris = item.tretti.pris;
    const besparing  = item.besparing;
    const besparPct  = item.minKonk > 0 ? Math.round(besparing / item.minKonk * 100) : 0;

    const konkPriser = Object.entries(item.konkurrenter).map(([butik, v]) => {
      const cls = butik === "elgiganten" ? "badge-elgiganten" : "badge-power";
      return `<div class="jmf-price">
        <div class="store"><span class="badge ${cls}">${butik}</span></div>
        <div class="pris">${v.pris.toLocaleString("sv-SE")} kr</div>
      </div>`;
    }).join("");

    return `<div class="jmf-card">
      <h3><a href="${url}" target="_blank" rel="noopener">${namn}</a>
        <span class="win-badge">-${besparPct}%</span>
      </h3>
      <div class="jmf-prices">
        <div class="jmf-price winner">
          <div class="store"><span class="badge badge-tretti">Tretti</span></div>
          <div class="pris">${trettiPris.toLocaleString("sv-SE")} kr ✓</div>
        </div>
        ${konkPriser}
        ${besparing > 0 ? `<span class="jmf-saving">Du sparar ${besparing.toLocaleString("sv-SE")} kr</span>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function renderCharts() {
  destroyCharts();

  // 1. Produkter per butik (doughnut)
  const butikCount = {};
  state.alla.forEach(p => {
    const b = p[COL.BUTIK] || "Okänd";
    butikCount[b] = (butikCount[b] || 0) + 1;
  });
  const butikLabels = Object.keys(butikCount);
  const butikColors = butikLabels.map(b => {
    if (b.toLowerCase() === "elgiganten") return "#003087";
    if (b.toLowerCase() === "power")      return "#cc0000";
    if (b.toLowerCase() === "tretti")     return "#007a3d";
    return "#94a3b8";
  });

  state.charts.butik = new Chart(document.getElementById("chart-butik"), {
    type: "doughnut",
    data: { labels: butikLabels, datasets: [{ data: Object.values(butikCount), backgroundColor: butikColors, borderWidth: 2, borderColor: "#fff" }] },
    options: { plugins: { legend: { position: "bottom", labels: { font: { size: 12 } } } }, responsive: true, maintainAspectRatio: true }
  });

  // 2. Kampanjer per kategori (top 10 bar)
  const katCount = {};
  state.kampanjer.forEach(p => {
    const k = p[COL.KATEGORI] || "Övrigt";
    katCount[k] = (katCount[k] || 0) + 1;
  });
  const sortedKat = Object.entries(katCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  state.charts.kategori = new Chart(document.getElementById("chart-kategori"), {
    type: "bar",
    data: {
      labels: sortedKat.map(([k]) => k),
      datasets: [{ data: sortedKat.map(([, v]) => v), backgroundColor: "#1a56db", borderRadius: 4 }]
    },
    options: {
      indexAxis: "y", plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { ticks: { font: { size: 11 } } } },
      responsive: true, maintainAspectRatio: true
    }
  });

  // 3. Rabattfördelning (histogram)
  const buckets = [0, 0, 0, 0, 0, 0]; // 0-9, 10-19, 20-29, 30-39, 40-49, 50+
  const labels  = ["0–9%", "10–19%", "20–29%", "30–39%", "40–49%", "50%+"];
  state.kampanjer.forEach(p => {
    const pct = parseFloat(p[COL.BESPARING_PCT]) || 0;
    if      (pct < 10) buckets[0]++;
    else if (pct < 20) buckets[1]++;
    else if (pct < 30) buckets[2]++;
    else if (pct < 40) buckets[3]++;
    else if (pct < 50) buckets[4]++;
    else               buckets[5]++;
  });
  const rabattColors = ["#94a3b8", "#60a5fa", "#3b82f6", "#f59e0b", "#f97316", "#16a34a"];

  state.charts.rabatt = new Chart(document.getElementById("chart-rabatt"), {
    type: "bar",
    data: { labels, datasets: [{ data: buckets, backgroundColor: rabattColors, borderRadius: 4 }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { ticks: { precision: 0 } } },
      responsive: true, maintainAspectRatio: true
    }
  });
}

function destroyCharts() {
  Object.values(state.charts).forEach(c => c.destroy());
  state.charts = {};
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData();
</script>
